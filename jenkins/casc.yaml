jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

jobs:
  - script: |
      pipelineJob('bibliotheque-microservices') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url(System.getenv('REPO_URL') ?: 'https://github.com/Marlin241/Container_Virtualisation.git')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
