services:
  users-db:
    image: postgres:16
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  books-db:
    image: postgres:16
    environment:
      POSTGRES_DB: books_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - books_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  loans-db:
    image: postgres:16
    environment:
      POSTGRES_DB: loans_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - loans_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-service:
    build: ./users-service
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@users-db:5432/users_db
      JWT_SECRET: ${JWT_SECRET:-devsecret}
    depends_on:
      users-db:
        condition: service_healthy

  books-service:
    build: ./books-service
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@books-db:5432/books_db
      JWT_SECRET: ${JWT_SECRET:-devsecret}
    depends_on:
      books-db:
        condition: service_healthy

  loans-service:
    build: ./loans-service
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@loans-db:5432/loans_db
      JWT_SECRET: ${JWT_SECRET:-devsecret}
      BOOKS_SERVICE_URL: http://books-service:8000
    depends_on:
      loans-db:
        condition: service_healthy
      books-service:
        condition: service_started

  frontend:
    build: ./frontend

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - users-service
      - books-service
      - loans-service

  jenkins:
    build: ./jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # GID of the host's "docker" group, needed so the jenkins user can use
    # the mounted /var/run/docker.sock. Run "getent group docker" on your
    # machine and set DOCKER_GID in .env if it isn't 989.
    group_add:
      - "${DOCKER_GID:-989}"

volumes:
  users_db_data:
  books_db_data:
  loans_db_data:
  jenkins_home:
